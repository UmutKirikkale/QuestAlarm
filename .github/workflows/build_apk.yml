# QuestAlarm — Telefona yüklenecek APK'yı bulutta üretir (bilgisayarda Flutter gerekmez).
name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Android dosyalarını tamamla
        run: flutter create . --platforms=android

      - name: APK derle
        run: flutter build apk --release

      - name: APK'yı indirilebilir yap
        uses: actions/upload-artifact@v4
        with:
          name: QuestAlarm-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
