name: quest_alarm
description: Retro 8-bit RPG alarm app for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sensors_plus: ^6.1.1
  shared_preferences: ^2.3.4
  android_alarm_manager_plus: ^4.0.4
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  permission_handler: ^11.4.0
  auto_start_flutter: ^1.4.0
  haptic_feedback: ^0.6.4+3
  flutter_animate: ^4.5.2
  firebase_core: ^4.9.0
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  firebase_storage: ^13.0.4
  home_widget: ^0.9.2
  google_sign_in: ^7.2.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  file_picker: ^10.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/monsters/
    - assets/images/items/
    - assets/images/maps/
